<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Choose a Course — vulanet</title>

<!-- Local Fonts -->
<link rel="stylesheet" href="public/assets/fonts/fonts.css">

<!-- Button Component Styles -->
<link rel="stylesheet" href="src/styles/components/buttons.css">

<style>
/* ===== COLOR VARIABLES ===== */
:root {
  --carpenter-blue: #4285F4;
  --belly-blue: #7B9FE0;
  --basalt: #4B4B4B;
  --cloud: #FFFFFF;
  --gecko: #1CB0F6;
  --ladybug: #EA4335;
  --bee: #FBBC05;
  --tiger: #FF6D01;
  --beetle: #AA00FF;
  --boa: #34A853;
  --hippo: #777777;
  --koala: #AFAFAF;
  --beluga: #E5E5E5;
  --arctic: #F7F7F7;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: 'Atkinson Hyperlegible Next', sans-serif;
  background: var(--cloud);
  color: var(--basalt);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1.4;
}

.screen {
  max-width: 420px;
  width: 100%;
  margin: 0 auto;
  padding-bottom: 100px;
  background: var(--cloud);
}

/* Header */
.header-container {
  padding: 24px 16px 32px;
  position: relative;
}

.header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.rabbit-icon {
  width: 46px;
  height: 46px;
  flex-shrink: 0;
}

.rabbit-icon img {
  width: 100%;
  height: 100%;
  display: block;
  filter: brightness(0) saturate(100%) invert(38%) sepia(98%) saturate(1500%) hue-rotate(202deg) brightness(94%) contrast(95%);
}

/* Speech Bubble */
[speech-bubble] {
  --bbColor: var(--cloud);
  --bbArrowSize: 0.8rem;
  --bbBorderRadius: 0.8rem;
  --bbPadding: 0.8rem;
  background: var(--bbColor);
  border-radius: var(--bbBorderRadius);
  padding: var(--bbPadding);
  position: relative;
  border: 2px solid var(--beluga);
  width: 230px;
  min-height: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: left;
  font-size: 16px;
  margin-left: var(--bbArrowSize);
  filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.1));
  flex-grow: 1;
}

[speech-bubble]::before {
  content: '';
  position: absolute;
  right: 100%;
  border: solid transparent;
  border-width: calc(var(--bbArrowSize) * 0.75) var(--bbArrowSize) calc(var(--bbArrowSize) * 0.75) 0;
  border-right-color: var(--beluga);
  top: 50%;
  transform: translateY(-50%);
}

[speech-bubble]::after {
  content: '';
  position: absolute;
  right: calc(100% - 2px);
  border: solid transparent;
  border-width: calc(var(--bbArrowSize) * 0.75 - 2px) calc(var(--bbArrowSize) - 2px) calc(var(--bbArrowSize) * 0.75 - 2px) 0;
  border-right-color: var(--bbColor);
  top: 50%;
  transform: translateY(-50%);
}

/* Sections */
.section {
  border-top: 1px solid var(--beluga);
  border-bottom: 1px solid var(--beluga);
  margin-top: -1px;
}

.section:first-of-type {
  border-top: none;
}

.section.matric-section {
  margin-top: 40px;
  border-top: 8px solid var(--arctic);
}

.section-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

.section-title:hover {
  background-color: var(--arctic);
}

.section-title i {
  font-size: 18px;
  color: var(--koala);
  transition: transform 0.3s ease;
}

.section.open .section-title i {
  transform: rotate(180deg);
}

/* Course list */
.course-list {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  padding: 0 16px;
}

.section.open .course-list {
  max-height: 800px;
  padding: 8px 16px 20px;
}

.course {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 14px;
  border: 2px solid var(--beluga);
  background: var(--cloud);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s ease;
}

.course:hover {
  background: var(--arctic);
  transform: translateY(-2px);
}

.course.selected {
  background: rgba(28, 176, 246, 0.12);
  border: 2px solid var(--gecko);
  color: var(--gecko);
}

.course.selected .subject-icon img {
  filter: brightness(0.95) saturate(1.2);
}

.subject-icon {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
}

.subject-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Continue button */
.continue-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  background: var(--cloud);
  padding: 14px 16px 22px;
  border-top: 1px solid var(--beluga);
  z-index: 100;
}

.continue {
  max-width: 388px;
  width: 100%;
}

@media (max-width: 400px) {
  .section.open .course-list {
    padding: 8px 12px 20px;
  }
  .course {
    padding: 12px;
    gap: 12px;
  }
}
</style>
</head>

<body>
<div class="screen">
  <div class="header-container">
    <div class="header">
      <div class="rabbit-icon">
        <img src="public/assets/icons/phosphor/fill/rabbit-fill.svg" alt="Vusi">
      </div>
      <div speech-bubble pleft acenter>What would you like to learn?</div>
    </div>
  </div>

  <div class="section" data-category="commerce">
    <div class="section-title"><span>Commerce</span><i class="ph-bold ph-caret-down"></i></div>
    <div class="course-list">
      <div class="course" data-course-id="FIN-001" data-course-name="Financial Accounting">
        <div class="subject-icon"><img src="public/assets/courses/financial-accounting.png" alt="Financial Accounting"></div>
        Financial Accounting
      </div>
    </div>
  </div>

  <div class="section" data-category="humanities">
    <div class="section-title"><span>Humanities</span><i class="ph-bold ph-caret-down"></i></div>
    <div class="course-list">
      <div class="course" data-course-id="LAW-001" data-course-name="International Law">
        <div class="subject-icon"><img src="public/assets/courses/international-law.png" alt="International Law"></div>
        International Law
      </div>
    </div>
  </div>

  <div class="section" data-category="medical">
    <div class="section-title"><span>Medical Sciences</span><i class="ph-bold ph-caret-down"></i></div>
    <div class="course-list">
      <div class="course" data-course-id="MED-001" data-course-name="Clinical Pharmacy">
        <div class="subject-icon"><img src="public/assets/courses/clinical-pharmacy.png" alt="Clinical Pharmacy"></div>
        Clinical Pharmacy
      </div>
      <div class="course" data-course-id="MED-002" data-course-name="Pharmacology-II">
        <div class="subject-icon"><img src="public/assets/courses/pharmacology-ii.png" alt="Pharmacology-II"></div>
        Pharmacology-II
      </div>
    </div>
  </div>

  <div class="section" data-category="technology">
    <div class="section-title"><span>Science & Technology</span><i class="ph-bold ph-caret-down"></i></div>
    <div class="course-list">
      <div class="course" data-course-id="TECH-001" data-course-name="Java Programming">
        <div class="subject-icon"><img src="public/assets/courses/java-programming.png" alt="Java Programming"></div>
        Java Programming
      </div>
      <div class="course" data-course-id="TECH-002" data-course-name="Web Design">
        <div class="subject-icon"><img src="public/assets/courses/web-design.png" alt="Web Design"></div>
        Web Design
      </div>
    </div>
  </div>

  <div class="section matric-section" data-category="matric">
    <div class="section-title"><span>Matric (NSC)</span><i class="ph-bold ph-caret-down"></i></div>
    <div class="course-list">
      <div class="course" data-course-id="SCI-001" data-course-name="G12 Life Sciences">
        <div class="subject-icon"><img src="public/assets/courses/g12-life-sciences.png" alt="G12 Life Sciences"></div>
        G12 Life Sciences
      </div>
    </div>
  </div>
</div>

<div class="continue-wrap">
  <button class="btn btn-carpenter-blue continue" id="continueBtn" disabled>CONTINUE</button>
</div>

<script>
// Expand/Collapse sections
document.querySelectorAll('.section-title').forEach(title => {
  title.addEventListener('click', (e) => {
    e.stopPropagation();
    const section = title.parentElement;
    section.classList.toggle('open');
  });
});

// Course selection
const courses = document.querySelectorAll('.course');
const continueBtn = document.getElementById('continueBtn');
let selectedCourseId = null;

function handleCourseSelection(courseElement) {
  courses.forEach(c => c.classList.remove('selected'));
  courseElement.classList.add('selected');
  selectedCourseId = courseElement.dataset.courseId;
  continueBtn.disabled = false;
  
  // Ensure selected course is visible
  const section = courseElement.closest('.section');
  if (section && !section.classList.contains('open')) {
    section.classList.add('open');
    setTimeout(() => {
      courseElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  } else {
    courseElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

courses.forEach(course => {
  course.addEventListener('click', (e) => {
    e.stopPropagation();
    handleCourseSelection(course);
  });
});

continueBtn.addEventListener('click', () => {
  if (selectedCourseId) {
    // Save selected course to localStorage for onboarding flow
    localStorage.setItem('selectedCourseId', selectedCourseId);
    window.location.href = 'onboarding.html';
  }
});
</script>
</body>
</html>
