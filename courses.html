<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Choose a Course — vulanet</title>

<!-- Local Fonts -->
<link rel="stylesheet" href="/public/assets/fonts/fonts.css">

<!-- Button Component Styles -->
<link rel="stylesheet" href="/src/styles/components/buttons.css">

<!-- Speech Bubble Component Styles -->
<link rel="stylesheet" href="/src/styles/components/speech-bubble.css">

<style>
/* ===== ADDITIONAL COURSE SELECTOR STYLES ===== */
:root {
  --carpenter-blue: #4285F4;
  --belly-blue: #7B9FE0;
  --basalt: #4B4B4B;
  --cloud: #FFFFFF;
  --gecko: #1CB0F6;
  --ladybug: #EA4335;
  --bee: #FBBC05;
  --tiger: #FF6D01;
  --beetle: #AA00FF;
  --boa: #34A853;
  --hippo: #777777;
  --koala: #AFAFAF;
  --beluga: #E5E5E5;
  --arctic: #F7F7F7;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Atkinson Hyperlegible Next', sans-serif;
  background: var(--cloud);
  color: var(--basalt);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1.4;
}

.screen {
  max-width: 420px;
  width: 100%;
  margin: 0 auto;
  padding-bottom: 100px;
  background: var(--cloud);
}

/* Header */
.header-container {
  padding: 24px 16px 32px;
  position: relative;
}

.header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.rabbit-icon {
  width: 46px;
  height: 46px;
  flex-shrink: 0;
}

.rabbit-icon img {
  width: 100%;
  height: 100%;
  display: block;
}

/* Sections */
.section {
  border-top: 1px solid var(--beluga);
  border-bottom: 1px solid var(--beluga);
  margin-top: -1px;
}

.section:first-of-type {
  border-top: none;
}

.section.matric-section {
  margin-top: 40px;
  border-top: 8px solid var(--arctic);
}

.section-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

.section-title:hover {
  background-color: var(--arctic);
}

/* Chevron icon using local SVG */
.chevron-icon {
  width: 18px;
  height: 18px;
  transition: transform 0.3s ease;
}

.chevron-icon img {
  width: 100%;
  height: 100%;
  display: block;
}

.section.open .chevron-icon {
  transform: rotate(180deg);
}

/* Course list */
.course-list {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  padding: 0 16px;
}

.section.open .course-list {
  max-height: 800px;
  padding: 8px 16px 20px;
}

.course {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 14px;
  border: 2px solid var(--beluga);
  background: var(--cloud);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s ease;
}

.course:hover {
  background: var(--arctic);
  transform: translateY(-2px);
}

.course.selected {
  background: rgba(28, 176, 246, 0.12);
  border: 2px solid var(--gecko);
  color: var(--gecko);
}

.subject-icon {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
}

.subject-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.course-title {
  font-weight: 700;
}

/* Continue button */
.continue-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  background: var(--cloud);
  padding: 14px 16px 22px;
  border-top: 1px solid var(--beluga);
  z-index: 100;
}

.continue {
  max-width: 388px;
  width: 100%;
}

@media (max-width: 400px) {
  .section.open .course-list {
    padding: 8px 12px 20px;
  }
  .course {
    padding: 12px;
    gap: 12px;
  }
}
</style>
</head>

<body>
<div class="screen">
  <div class="header-container">
    <div class="header">
      <div class="rabbit-icon">
        <img src="/public/assets/icons/phosphor/fill/rabbit.svg" alt="Vusi">
      </div>
      <div speech-bubble pleft acenter>What would you like to learn?</div>
    </div>
  </div>

  <div class="section" data-category="commerce">
    <div class="section-title">
      <span>Commerce</span>
      <div class="chevron-icon"><img src="/public/assets/icons/phosphor/regular/caret-down.svg" alt="▼"></div>
    </div>
    <div class="course-list">
      <div class="course" data-course-id="financial-accounting" data-course-name="Financial Accounting">
        <div class="subject-icon"><img src="/public/assets/courses/financial-accounting.png" alt="Financial Accounting"></div>
        <span class="course-title">Financial Accounting</span>
      </div>
    </div>
  </div>

  <div class="section" data-category="humanities">
    <div class="section-title">
      <span>Humanities</span>
      <div class="chevron-icon"><img src="/public/assets/icons/phosphor/regular/caret-down.svg" alt="▼"></div>
    </div>
    <div class="course-list">
      <div class="course" data-course-id="international-law" data-course-name="International Law">
        <div class="subject-icon"><img src="/public/assets/courses/international-law.png" alt="International Law"></div>
        <span class="course-title">International Law</span>
      </div>
    </div>
  </div>

  <div class="section" data-category="medical">
    <div class="section-title">
      <span>Medical Sciences</span>
      <div class="chevron-icon"><img src="/public/assets/icons/phosphor/regular/caret-down.svg" alt="▼"></div>
    </div>
    <div class="course-list">
      <div class="course" data-course-id="clinical-pharmacy" data-course-name="Clinical Pharmacy">
        <div class="subject-icon"><img src="/public/assets/courses/clinical-pharmacy.png" alt="Clinical Pharmacy"></div>
        <span class="course-title">Clinical Pharmacy</span>
      </div>
      <div class="course" data-course-id="pharmacology-ii" data-course-name="Pharmacology-II">
        <div class="subject-icon"><img src="/public/assets/courses/pharmacology-ii.png" alt="Pharmacology-II"></div>
        <span class="course-title">Pharmacology-II</span>
      </div>
    </div>
  </div>

  <div class="section" data-category="technology">
    <div class="section-title">
      <span>Science & Technology</span>
      <div class="chevron-icon"><img src="/public/assets/icons/phosphor/regular/caret-down.svg" alt="▼"></div>
    </div>
    <div class="course-list">
      <div class="course" data-course-id="java-programming" data-course-name="Java Programming">
        <div class="subject-icon"><img src="/public/assets/courses/java-programming.png" alt="Java Programming"></div>
        <span class="course-title">Java Programming</span>
      </div>
      <div class="course" data-course-id="web-design" data-course-name="Web Design">
        <div class="subject-icon"><img src="/public/assets/courses/web-design.png" alt="Web Design"></div>
        <span class="course-title">Web Design</span>
      </div>
    </div>
  </div>

  <div class="section matric-section" data-category="matric">
    <div class="section-title">
      <span>Matric (NSC)</span>
      <div class="chevron-icon"><img src="/public/assets/icons/phosphor/regular/caret-down.svg" alt="▼"></div>
    </div>
    <div class="course-list">
      <div class="course" data-course-id="g12-life-sciences" data-course-name="G12 Life Sciences">
        <div class="subject-icon"><img src="/public/assets/courses/g12-life-sciences.png" alt="G12 Life Sciences"></div>
        <span class="course-title">G12 Life Sciences</span>
      </div>
    </div>
  </div>
</div>

<div class="continue-wrap">
  <button class="btn btn-carpenter-blue continue" id="continueBtn" disabled>CONTINUE</button>
</div>

<script>
// Expand/Collapse sections
document.querySelectorAll('.section-title').forEach(title => {
  title.addEventListener('click', (e) => {
    e.stopPropagation();
    const section = title.parentElement;
    section.classList.toggle('open');
  });
});

// Course selection
const courses = document.querySelectorAll('.course');
const continueBtn = document.getElementById('continueBtn');
let selectedCourseId = null;
let selectedCourseName = null;

function handleCourseSelection(courseElement) {
  courses.forEach(c => c.classList.remove('selected'));
  courseElement.classList.add('selected');
  selectedCourseId = courseElement.dataset.courseId;
  selectedCourseName = courseElement.dataset.courseName;
  continueBtn.disabled = false;
  
  // Ensure selected course is visible
  const section = courseElement.closest('.section');
  if (section && !section.classList.contains('open')) {
    section.classList.add('open');
    setTimeout(() => {
      courseElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  } else {
    courseElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

courses.forEach(course => {
  course.addEventListener('click', (e) => {
    e.stopPropagation();
    handleCourseSelection(course);
  });
});

continueBtn.addEventListener('click', () => {
  if (selectedCourseId) {
    localStorage.setItem('selectedCourseId', selectedCourseId);
    localStorage.setItem('selectedCourseName', selectedCourseName);
    window.location.href = 'welcome.html';
  }
});
</script>
</body>
</html>
